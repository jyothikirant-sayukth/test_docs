{{ define "main" }}
  {{ with site.GetPage "/pages/404" }}
    <section class="section-md text-center">
      <div class="container">
        <div class="row justify-center">
          <div class="sm:col-10 md:col-8 lg:col-6">
            <span class="text-text mb-6 block text-8xl font-semibold">404</span>
            <h1 class="h2">{{ .Title }}</h1>
            <div class="content">
              {{ .Content }}
              <p class="mt-4 text-base text-slate-600" id="ps-translation-fallback-note" hidden>
                Page not available in this language yet. Showing English content.
              </p>
            </div>
            <a href="{{ "/" | relLangURL }}" class="btn btn-md btn-primary">
              Back to Home
            </a>
          </div>
        </div>
      </div>
    </section>
  {{ end }}

  <script>
    (function () {
      var path = window.location.pathname || "/";
      var match = path.match(/^\/([a-z]{2,3})\/(.*)$/i);
      if (!match) return;

      var lang = String(match[1] || "").toLowerCase();
      if (!lang || lang === "en") return;

      var rest = "/" + String(match[2] || "");
      rest = rest.replace(/\/{2,}/g, "/");
      if (!rest || rest === "/") rest = "/";

      var target = rest;
      var queryPrefix = target.indexOf("?") === -1 ? "?" : "&";
      var redirectUrl =
        target +
        queryPrefix +
        "ps_lang=" +
        encodeURIComponent(lang) +
        "&ps_missing_translation=1";

      window.location.replace(redirectUrl);
    })();
  </script>
{{ end }}
