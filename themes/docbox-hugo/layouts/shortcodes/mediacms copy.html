{{/* Get video URL and title from shortcode params */}}
{{ $url := .Get "url" }}
{{ $title := .Get "title" | default "Video" }}

{{/* Generate a unique iframe ID */}}
{{ $iframeID := "video-frame-" | printf "%s%d" (now.UnixNano) }}

<!-- Video container -->
<div style="display: flex; justify-content: center; align-items: center; padding-bottom: 30px;">
  <div style="position: relative; width: 100%; max-width: 768px; padding-bottom: 56.25%; height: 0; overflow: hidden;">
    <!-- Iframe with dynamic ID; src will be set by JS -->
    <iframe 
      id="{{ $iframeID }}"
      title="{{ $title }}"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen
      style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
    </iframe>
  </div>
</div>

<!-- Inject fresh timestamp at runtime to prevent session expiry -->
<script>
  (() => {
    const iframe = document.getElementById('{{ $iframeID }}');
    if (iframe) {
      const baseUrl = "{{ $url }}"; 
      const timestamp = Math.floor(Date.now() / 1000);
      iframe.src = `${baseUrl}?d=cms&q=${timestamp}`;
    }
  })();
</script>
